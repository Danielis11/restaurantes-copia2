<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - RestauranteWeb</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            background: var(--white);
        }

        .login-layout {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* ===== LEFT PANEL ===== */
        .auth-side {
            flex: 1;
            background: linear-gradient(135deg, var(--brand-color) 0%, #1e2a80 100%);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }

        .auth-side::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotate(-10deg);
            z-index: 1;
        }

        .auth-side-content {
            position: relative;
            z-index: 2;
            max-width: 500px;
        }

        .side-logo {
            font-size: 4rem;
            margin-bottom: 2rem;
            color: var(--white);
        }

        .side-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        .side-text {
            font-size: 1.15rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .side-footer {
            margin-top: auto;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 2;
            padding-top: 4rem;
        }

        /* ===== RIGHT PANEL (FORM) ===== */
        .auth-main {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: var(--white);
            position: relative;
            overflow-y: auto;
        }

        .auth-card {
            width: 100%;
            max-width: 550px;
            padding: 2rem 0;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .auth-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--gray-500);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        .auth-subtitle a {
            color: var(--text-dark);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-subtitle a:hover {
            text-decoration: underline;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 0;
            border: none;
            border-bottom: 2px solid var(--gray-200);
            background: transparent;
            font-size: 0.95rem;
            color: var(--text-dark);
            font-weight: 500;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-bottom-color: var(--text-dark);
        }

        .form-input.error {
            border-bottom-color: var(--error);
        }

        .form-error {
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .password-toggle {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 0.25rem;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-top: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--gray-600);
        }

        .checkbox-group input {
            margin-top: 0.2rem;
        }

        .auth-actions {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
        }

        .btn-black {
            background: var(--text-dark);
            color: var(--white);
        }

        .btn-black:hover {
            background: #000000;
            transform: translateY(-1px);
        }

        .btn-spinner {
            display: none;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            max-width: 400px;
            background: white;
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid var(--brand-color);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            border-left-color: var(--success);
        }

        .notification.error {
            border-left-color: var(--error);
        }

        .return-home {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @media (max-width: 1000px) {
            .auth-side {
                display: none;
            }

            .auth-main {
                flex: 1;
                padding: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }
    </style>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="login-layout">
        <div class="auth-side">
            <div class="auth-side-content">
                <div class="side-logo"><i class="fas fa-asterisk"></i></div>
                <h1 class="side-title">Empieza<br>Hoy Mismo.</h1>
                <p class="side-text">Únete a cientos de restaurantes que ya están transformando su gestión digital con
                    nosotros.</p>
            </div>
            <div class="side-footer">&copy; 2025 RestauranteWeb. Todos los derechos reservados.</div>
        </div>

        <div class="auth-main">
            <a href="/" class="return-home"><i class="fas fa-arrow-left"></i> Volver al inicio</a>

            <div class="auth-card">
                <div class="brand-name">RestauranteWeb</div>
                <h2 class="auth-title">Crea tu cuenta</h2>
                <p class="auth-subtitle">¿Ya tienes cuenta? <a href="/login.html">Inicia sesión aquí</a>.</p>

                <form id="register-form" class="form">
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="nombre" name="nombre" class="form-input" placeholder="Nombre"
                                required>
                            <div class="form-error" id="nombre-error"></div>
                        </div>
                        <div class="form-group">
                            <input type="text" id="apellido" name="apellido" class="form-input" placeholder="Apellido"
                                required>
                            <div class="form-error" id="apellido-error"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <input type="email" id="email" name="email" class="form-input" placeholder="Correo electrónico"
                            required>
                        <div class="form-error" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <input type="tel" id="telefono" name="telefono" class="form-input" placeholder="Teléfono"
                            required>
                        <div class="form-error" id="telefono-error"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <input type="password" id="password" name="password" class="form-input"
                                placeholder="Contraseña" required>
                            <button type="button" class="password-toggle" id="password-toggle" tabindex="-1"><i
                                    class="fas fa-eye"></i></button>
                            <div class="form-error" id="password-error"></div>
                        </div>
                        <div class="form-group">
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                                placeholder="Confirmar contraseña" required>
                            <button type="button" class="password-toggle" id="confirm-password-toggle" tabindex="-1"><i
                                    class="fas fa-eye"></i></button>
                            <div class="form-error" id="confirmPassword-error"></div>
                        </div>
                    </div>

                    <label class="checkbox-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        Acepto los <a href="#" style="color:var(--text-dark); font-weight:600;">términos y
                            condiciones</a> y la política de privacidad.
                    </label>

                    <div class="auth-actions">
                        <button type="submit" class="btn btn-black" id="register-btn">
                            <span class="btn-text">Crear Cuenta Ahora</span>
                            <div class="btn-spinner"><i class="fas fa-spinner fa-spin"></i></div>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Re-bind password toggles
            ['password-toggle', 'confirm-password-toggle'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.addEventListener('click', function () {
                        const input = this.previousElementSibling;
                        const icon = this.querySelector('i');
                        const isPass = input.type === 'password';
                        input.type = isPass ? 'text' : 'password';
                        icon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
                    });
                }
            });

            // Password match validation
            const p1 = document.getElementById('password');
            const p2 = document.getElementById('confirmPassword');
            const err = document.getElementById('confirmPassword-error');

            function checkMatch() {
                if (p2.value && p1.value !== p2.value) {
                    p2.classList.add('error');
                    err.textContent = 'Las contraseñas no coinciden';
                    err.classList.add('show');
                } else {
                    p2.classList.remove('error');
                    err.classList.remove('show');
                }
            }
            p1?.addEventListener('input', checkMatch);
            p2?.addEventListener('input', checkMatch);
        });
    </script>
</body>

</html>
